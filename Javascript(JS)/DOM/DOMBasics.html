<!--
The Document Object Model (DOM) is a programming interface for web documents. It represents the page
so that programs can change the document structure, style, and content.
The DOM provides a structured representation of the document as a tree of objects.

JavaScript uses the DOM to:
Access elements
Read data
Update UI
Create/Delete elements
Handle user actions


-->
