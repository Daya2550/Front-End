<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello, World!</h1>
</body>
</html>

<script>
    //not showing the hidden text
    // Accessing the innerText of the <h1> element
    const heading = document.querySelector('h1');
    console.log(heading.innerText); // Outputs: Hello, World!
    // Modifying the innerText of the <h1> element
    heading.innerText = 'Welcome to the DOM!';
</script>
