<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="username" value="Dayanand">
</body>
</html>
<script>
    // Accessing the value of the input element
    const inputField = document.getElementById('username');
    console.log(inputField.value); // Outputs: Dayanand
    // Modifying the value of the input element
    inputField.value = 'John Doe';
    console.log(inputField.value); // Outputs: John Doe
</script>
