<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p class="box">A</p>
     <p class="box">B</p>
</body>
</html>

<script>
const elements = document.querySelectorAll(".box"); // NodeList of all elements with class 'box'

elements.forEach((item) => {
  console.log(item);
});

elements.forEach((item, index) => {
  item.textContent = `Box ${index + 1}`;
  item.style.color = "blue";
});
</script>
