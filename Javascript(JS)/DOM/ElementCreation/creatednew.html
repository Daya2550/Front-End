<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="list">
        <li>Item 1</li>
        <li>Item 2</li>
    </ul>
</body>
</html>
<script>
    // Creating a new element
    const newItem = document.createElement('li');
    newItem.textContent = 'Item 3';
    newItem.style.color = 'green';
    // Appending the new element to the list
    const list = document.getElementById('list');
    list.appendChild(newItem);
    // Creating another new element

    const newItem2 = document.createElement('li');
    newItem2.textContent = 'Item 4';
    newItem2.style.color = 'blue';
    // Appending the second new element to the list
    list.appendChild(newItem2);

    // Optimized way to create and append a new element 
    const dataHeading = document.createTextNode('Data Heading');
    const newItem3 = document.createElement('li');
    newItem3.appendChild(dataHeading);
    list.appendChild(newItem3);

</script>
