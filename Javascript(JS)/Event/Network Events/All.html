<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Network Events</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:20px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        .card{
            border:1px solid #ccc;
            border-radius:10px;
            padding:15px;
            margin-bottom:15px;
            background:#fafafa;
        }

        .title{
            font-size:20px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .value{
            color:blue;
            line-height:28px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            background:green;
            color:white;
            margin-top:10px;
        }

        #logBox{
            background:black;
            color:lime;
            padding:15px;
            border-radius:10px;
            height:250px;
            overflow-y:auto;
        }

        .log{
            margin-bottom:8px;
        }

        .online{
            color:green;
            font-weight:bold;
        }

        .offline{
            color:red;
            font-weight:bold;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>All Network Events Example</h1>

    <!-- Internet Status -->
    <div class="card">

        <div class="title">
            Internet Status
        </div>

        <div class="value"
             id="status">

            Checking...

        </div>

    </div>

    <!-- Network Information -->
    <div class="card">

        <div class="title">
            Network Information
        </div>

        <div class="value"
             id="networkInfo">

            Loading...

        </div>

    </div>

    <!-- Fetch API -->
    <div class="card">

        <div class="title">
            Fetch API Request
        </div>

        <button id="fetchBtn">
            Fetch Data
        </button>

        <div class="value"
             id="fetchResult">

        </div>

    </div>

    <!-- Logs -->
    <div class="card">

        <div class="title">
            Event Logs
        </div>

        <div id="logBox"></div>

    </div>

</div>

<script>

    const status =
        document.getElementById(
            "status"
        );

    const networkInfo =
        document.getElementById(
            "networkInfo"
        );

    const fetchBtn =
        document.getElementById(
            "fetchBtn"
        );

    const fetchResult =
        document.getElementById(
            "fetchResult"
        );

    const logBox =
        document.getElementById(
            "logBox"
        );

    // =========================
    // LOG FUNCTION
    // =========================

    function addLog(message) {

        const div =
            document.createElement("div");

        div.className = "log";

        const time =
            new Date()
            .toLocaleTimeString();

        div.innerHTML =
            `[${time}] ${message}`;

        logBox.appendChild(div);

        logBox.scrollTop =
            logBox.scrollHeight;
    }

    // =========================
    // ONLINE / OFFLINE EVENTS
    // =========================

    function updateNetworkStatus() {

        if(navigator.onLine) {

            status.innerHTML =
                `<span class="online">
                    Online
                </span>`;

            addLog(
                "Internet Connected"
            );

        } else {

            status.innerHTML =
                `<span class="offline">
                    Offline
                </span>`;

            addLog(
                "Internet Disconnected"
            );
        }
    }

    updateNetworkStatus();

    window.addEventListener(
        "online",
        updateNetworkStatus
    );

    window.addEventListener(
        "offline",
        updateNetworkStatus
    );

    // =========================
    // NETWORK INFORMATION API
    // =========================

    function updateConnectionInfo() {

        const connection =
            navigator.connection ||
            navigator.mozConnection ||
            navigator.webkitConnection;

        if(connection) {

            networkInfo.innerHTML = `
                Effective Type :
                ${connection.effectiveType} <br>

                Downlink :
                ${connection.downlink} Mbps <br>

                RTT :
                ${connection.rtt} ms <br>

                Save Data :
                ${connection.saveData}
            `;

            addLog(
                "Network Info Updated"
            );

            connection.addEventListener(
                "change",
                updateConnectionInfo
            );

        } else {

            networkInfo.innerHTML =
                "Network Information API Not Supported";
        }
    }

    updateConnectionInfo();

    // =========================
    // FETCH API NETWORK REQUEST
    // =========================

    fetchBtn.addEventListener(
        "click",
        async () => {

            fetchResult.innerHTML =
                "Loading...";

            addLog(
                "Fetch Request Started"
            );

            try {

                const response =
                    await fetch(
                        "https://jsonplaceholder.typicode.com/users/1"
                    );

                const data =
                    await response.json();

                fetchResult.innerHTML = `
                    Name :
                    ${data.name} <br>

                    Email :
                    ${data.email}
                `;

                addLog(
                    "Fetch Request Success"
                );

            } catch(error) {

                fetchResult.innerHTML =
                    "Network Error";

                addLog(
                    "Fetch Request Failed"
                );
            }
        }
    );

    // =========================
    // PAGE LOAD EVENTS
    // =========================

    window.addEventListener(
        "load",
        () => {

            addLog(
                "Page Fully Loaded"
            );
        }
    );

    // =========================
    // BEFORE UNLOAD EVENT
    // =========================

    window.addEventListener(
        "beforeunload",
        (event) => {

            event.preventDefault();

            event.returnValue = "";

        }
    );

</script>

</body>
</html>
