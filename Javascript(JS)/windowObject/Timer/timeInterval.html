<script>
// Using setInterval to log a message every 2 seconds
const intervalId = window.setInterval(() => {
    console.log("This message is logged every 2 seconds");
}, 2000);

// To stop the interval after 10 seconds
window.setTimeout(() => {

    window.clearInterval(intervalId); // Clears the interval, stopping the repeated execution
    
    console.log("Interval cleared, no more messages will be logged");
}, 10000);
</script>
