<script>
    // confirm is get result as the true or false based on the user response
    var userResponse ;
    userResponse  = confirm("Do you want to proceed?");  // Displaying a confirmation dialog with OK and Cancel options
    if (userResponse) {
        alert("You chose to proceed.");  // User clicked OK
    } else {
        alert("You chose to cancel.");  // User clicked Cancel
    }
</script>
