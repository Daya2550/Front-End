<script>
    // prompt is used to get the user input and it will return the value entered by the user or null if the user cancels the prompt dialog
    var userResponse = prompt("Please enter your name:");  // Displaying a prompt dialog to get user input
    if (userResponse) {
        alert("Hello, " + userResponse + "!");  // User entered a name and clicked OK
    } else {
        alert("You did not enter a name.");  // User clicked Cancel or left the input empty
    }
</script>
